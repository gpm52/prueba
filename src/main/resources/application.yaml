spring:
  application:
    name: umulingo
  datasource:
    url: jdbc:h2:file:./data/umulingo
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.H2Dialect
  h2:
    console:
      enabled: true
